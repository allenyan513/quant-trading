# Local distributed run. Each service is an independent container,
# mirroring the Cloud Run deployment (one image per service).
services:
  data:
    build:
      context: .
      dockerfile: services/data/Dockerfile
    environment:
      - PORT=8080
      - DATABASE_URL=${DATABASE_URL}
      - FMP_API_KEY=${FMP_API_KEY}
      - FMP_BASE_URL=${FMP_BASE_URL:-https://financialmodelingprep.com/stable}
      - ALPHA_URL=http://alpha:8080
    ports:
      - "8081:8080"
    depends_on:
      - alpha

  alpha:
    build:
      context: .
      dockerfile: services/alpha/Dockerfile
    environment:
      - PORT=8080
      - DATABASE_URL=${DATABASE_URL}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - SIGNAL_MODEL=${SIGNAL_MODEL:-claude-opus-4-8}
      - FMP_API_KEY=${FMP_API_KEY}
      - FMP_BASE_URL=${FMP_BASE_URL:-https://financialmodelingprep.com/stable}
      - PORTFOLIO_URL=http://portfolio:8080
    ports:
      - "8082:8080"
    depends_on:
      - portfolio

  portfolio:
    build:
      context: .
      dockerfile: services/portfolio/Dockerfile
    environment:
      - PORT=8080
      - DATABASE_URL=${DATABASE_URL}
      - FMP_API_KEY=${FMP_API_KEY}
      - FMP_BASE_URL=${FMP_BASE_URL:-https://financialmodelingprep.com/stable}
      - PORTFOLIO_CAPITAL=${PORTFOLIO_CAPITAL:-100000}
      - SIZE_LOW=${SIZE_LOW:-0.01}
      - SIZE_MED=${SIZE_MED:-0.02}
      - SIZE_HIGH=${SIZE_HIGH:-0.03}
      - MAX_POSITIONS=${MAX_POSITIONS:-20}
      - MAX_WEIGHT_PER_NAME=${MAX_WEIGHT_PER_NAME:-0.05}
      - MAX_SECTOR_WEIGHT=${MAX_SECTOR_WEIGHT:-0.30}
    ports:
      - "8084:8080"
