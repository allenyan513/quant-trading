name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Static + unit checks only — the unit tests are pure (no FMP / DB), so CI
      # needs no secrets. Live integration checks stay manual / out of CI for now.
      - run: pnpm typecheck
      - run: pnpm test
